services:
  web:
    build: .
    container_name: django_app2
    # Switched from development runserver to Gunicorn for production
    command: gunicorn ecommerce_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8002:8000" # Mapped to host port 8002 so Nginx can route traffic here
    environment:
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    env_file:
      - .env
    depends_on:
      - rabbitmq_app2
      - redis_app2
    networks:
      - portfolio-network

  rabbitmq_app2:
    image: rabbitmq:3-management
    container_name: rabbitmq_app2
    # Host port mappings removed for security and to prevent server conflicts.
    # It remains fully accessible to your web and worker containers internally.
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 15s
      retries: 5
    networks:
      - portfolio-network

  redis_app2:
    image: redis:alpine
    container_name: redis_app2
    # Removed host mapping "6379:6379" because Project 1 is already using it on the host.
    # It will still operate on 6379 internally for this specific project.
    volumes:
      - redis_data:/data
    networks:
      - portfolio-network

  celery_worker_app2:
    build: .
    container_name: celery_worker_app2
    command: celery -A ecommerce_project worker --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - rabbitmq_app2
      - redis_app2
    networks:
      - portfolio-network

  flower_app2:
    image: mher/flower
    container_name: celery_flower_app2
    environment:
      # Updated broker URL to match the new rabbitmq container name
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq_app2:5672//
      - CELERY_FLOWER_URL=http://0.0.0.0:5555
    ports:
      - "5555:5555" # Exposes Flower to the outside world
    depends_on:
      - rabbitmq_app2
      - celery_worker_app2
    networks:
      - portfolio-network

networks:
  portfolio-network:
    external: true

volumes:
  redis_data:
